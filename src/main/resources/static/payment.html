<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Make a Payment – Event Ticket Booking</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <style>
    body { background: #0f0c29; background: linear-gradient(135deg,#0f0c29,#302b63,#24243e); min-height:100vh; color:#fff; }
    .navbar { background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
    .navbar-brand { font-weight:700; font-size:1.4rem; color:#a78bfa !important; }
    .nav-link { color:rgba(255,255,255,0.75) !important; }
    .nav-link:hover { color:#a78bfa !important; }
    .card { background: rgba(255,255,255,0.07); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.15); border-radius:16px; }
    .card-header { background: rgba(167,139,250,0.2); border-bottom:1px solid rgba(255,255,255,0.1); border-radius:16px 16px 0 0 !important; }
    .form-control, .form-select { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); color:#fff; border-radius:8px; }
    .form-control:focus, .form-select:focus { background:rgba(255,255,255,0.12); border-color:#a78bfa; color:#fff; box-shadow:0 0 0 0.25rem rgba(167,139,250,0.25); }
    .form-control::placeholder { color:rgba(255,255,255,0.4); }
    .form-select option { background:#302b63; color:#fff; }
    .form-label { color:rgba(255,255,255,0.85); font-weight:500; }
    .btn-primary { background:linear-gradient(135deg,#a78bfa,#7c3aed); border:none; border-radius:8px; font-weight:600; padding:.65rem 2rem; }
    .btn-primary:hover { background:linear-gradient(135deg,#7c3aed,#5b21b6); transform:translateY(-1px); }
    .badge-card { background:rgba(59,130,246,0.25); color:#93c5fd; border:1px solid rgba(59,130,246,0.4); }
    .badge-cash { background:rgba(16,185,129,0.25); color:#6ee7b7; border:1px solid rgba(16,185,129,0.4); }
    #cardFields, #cashFields { transition: all .3s ease; }
    .section-icon { font-size:2rem; color:#a78bfa; }
    .text-muted { color:rgba(255,255,255,0.5) !important; }
  </style>
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand" href="#"><i class="bi bi-ticket-perforated-fill me-2"></i>EventTickets</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link active" href="payment.html"><i class="bi bi-credit-card me-1"></i>Make Payment</a></li>
        <li class="nav-item"><a class="nav-link" href="payment-history.html"><i class="bi bi-clock-history me-1"></i>Payment History</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- ── Main Form ──────────────────────────────────────────────────────────── -->
<div class="container" style="max-width:640px;">
  <div class="text-center mb-4">
    <div class="section-icon"><i class="bi bi-credit-card-2-front-fill"></i></div>
    <h2 class="fw-bold mt-2">Make a Payment</h2>
    <p class="text-muted">Complete your ticket booking payment below</p>
  </div>

  <div class="card shadow-lg">
    <div class="card-header py-3">
      <h5 class="mb-0 text-white"><i class="bi bi-lock-fill me-2 text-warning"></i>Secure Payment Form</h5>
    </div>
    <div class="card-body p-4">

      <!-- Ticket Info -->
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-ticket me-1"></i>Ticket ID</label>
        <input type="text" id="ticketId" class="form-control" placeholder="e.g. TKT-1001" required />
      </div>

      <div class="mb-3">
        <label class="form-label"><i class="bi bi-currency-dollar me-1"></i>Amount (LKR)</label>
        <input type="number" id="amount" class="form-control" placeholder="e.g. 2500.00" min="1" step="0.01" required />
      </div>

      <div class="mb-3">
        <label class="form-label"><i class="bi bi-calendar3 me-1"></i>Payment Date</label>
        <input type="date" id="paymentDate" class="form-control" required />
      </div>

      <!-- Payment Type Selector -->
      <div class="mb-3">
        <label class="form-label"><i class="bi bi-wallet2 me-1"></i>Payment Type</label>
        <select id="paymentType" class="form-select" onchange="togglePaymentFields()">
          <option value="CARD">💳 Card Payment</option>
          <option value="CASH">💵 Cash Payment</option>
        </select>
      </div>

      <!-- Card-specific fields -->
      <div id="cardFields">
        <hr style="border-color:rgba(255,255,255,0.1);" />
        <p class="small text-muted mb-3"><i class="bi bi-info-circle me-1"></i>Card details – only last 4 digits are stored for security.</p>
        <div class="mb-3">
          <label class="form-label">Card Holder Name</label>
          <input type="text" id="cardHolderName" class="form-control" placeholder="e.g. John Silva" />
        </div>
        <div class="mb-3">
          <label class="form-label">Card Number</label>
          <input type="text" id="cardNumber" class="form-control" placeholder="16-digit card number"
                 maxlength="16" oninput="this.value=this.value.replace(/\D/g,'')"/>
        </div>
      </div>

      <!-- Cash-specific fields -->
      <div id="cashFields" style="display:none;">
        <hr style="border-color:rgba(255,255,255,0.1);" />
        <div class="mb-3">
          <label class="form-label"><i class="bi bi-person-badge me-1"></i>Received By (Staff Name)</label>
          <input type="text" id="receivedBy" class="form-control" placeholder="e.g. Kasun Perera" />
        </div>
      </div>

      <!-- Submit Button -->
      <div class="d-grid mt-4">
        <button class="btn btn-primary btn-lg" onclick="submitPayment()">
          <i class="bi bi-check-circle-fill me-2"></i>Confirm Payment
        </button>
      </div>

      <!-- Alert area -->
      <div id="alertBox" class="mt-3"></div>

    </div>
  </div>
</div>

<br/><br/>

<script>
  // Set today's date as default
  document.getElementById('paymentDate').valueAsDate = new Date();

  function togglePaymentFields() {
    const type = document.getElementById('paymentType').value;
    document.getElementById('cardFields').style.display = type === 'CARD' ? 'block' : 'none';
    document.getElementById('cashFields').style.display = type === 'CASH' ? 'block' : 'none';
  }

  async function submitPayment() {
    // ── Validation ──────────────────────────────────────────────────────────
    const ticketId    = document.getElementById('ticketId').value.trim();
    const amount      = document.getElementById('amount').value.trim();
    const paymentDate = document.getElementById('paymentDate').value.trim();
    const paymentType = document.getElementById('paymentType').value;

    if (!ticketId || !amount || !paymentDate) {
      showAlert('danger', 'Please fill in all required fields.');
      return;
    }

    const body = { ticketId, amount, paymentDate, paymentType };

    if (paymentType === 'CARD') {
      const cardHolderName = document.getElementById('cardHolderName').value.trim();
      const cardNumber     = document.getElementById('cardNumber').value.trim();
      if (!cardHolderName || cardNumber.length < 16) {
        showAlert('danger', 'Please enter a valid card holder name and 16-digit card number.');
        return;
      }
      body.cardHolderName = cardHolderName;
      body.cardNumber     = cardNumber;
    } else {
      const receivedBy = document.getElementById('receivedBy').value.trim();
      if (!receivedBy) {
        showAlert('danger', 'Please enter the name of the staff member who received the cash.');
        return;
      }
      body.receivedBy = receivedBy;
    }

    // ── API Call ─────────────────────────────────────────────────────────────
    try {
      showAlert('info', '<span class="spinner-border spinner-border-sm me-2"></span>Processing payment...');

      const response = await fetch('http://localhost:8080/api/payments/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await response.json();

      if (data.success) {
        // Redirect to confirmation page with payment details
        const params = new URLSearchParams({
          paymentId:   data.paymentId,
          paymentType: data.paymentType,
          amount:      data.amount,
          ticketId:    data.ticketId,
          date:        data.date,
          message:     data.message
        });
        window.location.href = 'payment-confirm.html?' + params.toString();
      } else {
        showAlert('danger', 'Payment failed: ' + data.message);
      }
    } catch (err) {
      showAlert('danger', 'Connection error. Is the server running? ' + err.message);
    }
  }

  function showAlert(type, msg) {
    const colors = { danger:'#dc3545', info:'#0dcaf0', success:'#198754' };
    document.getElementById('alertBox').innerHTML =
      `<div class="alert" style="background:rgba(255,255,255,0.08);border:1px solid ${colors[type]};color:#fff;border-radius:8px;">${msg}</div>`;
  }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
